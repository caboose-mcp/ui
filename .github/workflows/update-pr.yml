# update-pr.yml — triggered by caboose-mcp's notify-ui.yml via repository_dispatch.
#
# Flow:
#   1. caboose-mcp pushes to main → fires "caboose-mcp-updated" dispatch with commit SHA
#   2. This workflow clones caboose-mcp at that SHA and regenerates src/data/changelog.json
#   3. Creates or force-updates branch "update/changelog" and opens a PR against main
#   4. CI runs on the PR; merging it triggers deploy.yml
#
# Required secret:
#   CABOOSE_MCP_READ_TOKEN — fine-grained PAT with Contents: read on caboose-mcp/caboose-mcp
#                            (only needed if the caboose-mcp repo is private)
#                            If public, remove the token from the checkout step.

name: Update changelog PR

on:
  repository_dispatch:
    types: [caboose-mcp-updated]
  push:
    branches: [main]

jobs:
  update-pr:
    name: Regenerate changelog and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout UI repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clone caboose-mcp at dispatched SHA
        uses: actions/checkout@v4
        with:
          repository: caboose-mcp/caboose-mcp
          ref: ${{ github.event.client_payload.sha }}
          path: _caboose-mcp
          fetch-depth: 50

      - name: Regenerate changelog.json from caboose-mcp history
        run: |
          cd _caboose-mcp
          git log --pretty=format:'{"hash":"%H","date":"%aI","subject":"%s","author":"%an"}' -50 \
          | python3 -c "
          import sys, json, re
          entries = []
          for line in sys.stdin:
              line = line.strip()
              if not line: continue
              try:
                  e = json.loads(line)
              except json.JSONDecodeError:
                  continue
              tags = re.findall(r'^(feat|fix|docs|ci|chore|refactor|style|test|perf)', e['subject'])
              e['tags'] = tags if tags else ['other']
              e['repo'] = 'caboose-mcp'
              e['hash'] = e['hash'][:40]
              entries.append(e)
          print(json.dumps(entries, indent=2))
          " > ../src/data/changelog.json
          cd ..
          echo "Generated $(wc -l < src/data/changelog.json) lines of changelog"

      - name: Cleanup clone
        run: rm -rf _caboose-mcp

      - name: Generate changelog-ui.json from UI repo history
        run: |
          git log --pretty=format:'{"hash":"%H","date":"%aI","subject":"%s","author":"%an"}' -50 \
          | python3 -c "
          import sys, json, re
          entries = []
          for line in sys.stdin:
              line = line.strip()
              if not line: continue
              try:
                  e = json.loads(line)
              except json.JSONDecodeError:
                  continue
              tags = re.findall(r'^(feat|fix|docs|ci|chore|refactor|style|test|perf)', e['subject'])
              e['tags'] = tags if tags else ['other']
              e['repo'] = 'ui'
              e['hash'] = e['hash'][:40]
              entries.append(e)
          print(json.dumps(entries, indent=2))
          " > src/data/changelog-ui.json
          echo "Generated $(wc -l < src/data/changelog-ui.json) lines of UI changelog"

      - name: Generate changelog-meml.json from meml repo (if available)
        continue-on-error: true
        run: |
          git clone --depth 50 https://github.com/caboose-mcp/meml.git _meml 2>/dev/null || true
          if [ -d _meml ]; then
            cd _meml
            git log --pretty=format:'{"hash":"%H","date":"%aI","subject":"%s","author":"%an"}' -50 \
            | python3 -c "
            import sys, json, re
            entries = []
            for line in sys.stdin:
                line = line.strip()
                if not line: continue
                try:
                    e = json.loads(line)
                except json.JSONDecodeError:
                    continue
                tags = re.findall(r'^(feat|fix|docs|ci|chore|refactor|style|test|perf)', e['subject'])
                e['tags'] = tags if tags else ['other']
                e['repo'] = 'meml'
                e['hash'] = e['hash'][:40]
                entries.append(e)
            print(json.dumps(entries, indent=2))
            " > ../src/data/changelog-meml.json
            cd ..
            echo "Generated $(wc -l < src/data/changelog-meml.json) lines of meml changelog"
            rm -rf _meml
          else
            echo "[] " > src/data/changelog-meml.json
            echo "meml repo not found, creating empty placeholder"
          fi

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or reset update/changelog branch
        run: |
          git fetch origin || true
          if git ls-remote --exit-code origin update/changelog; then
            git checkout update/changelog
            git reset --hard origin/main
          else
            git checkout -b update/changelog
          fi

      - name: Commit changelog
        run: |
          git add src/data/changelog.json src/data/changelog-ui.json src/data/changelog-meml.json
          if git diff --cached --quiet; then
            echo "No changelog changes — skipping PR"
            exit 0
          fi
          SHA="${{ github.event.client_payload.sha }}"
          git commit -m "chore: update changelogs from all repos"

      - name: Push branch
        run: git push --force origin update/changelog

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.client_payload.sha }}
          MSG: ${{ github.event.client_payload.message }}
        run: |
          TITLE="chore: update changelog from caboose-mcp@${SHA:0:7}"
          BODY="Automated changelog update from [caboose-mcp@${SHA:0:7}](https://github.com/caboose-mcp/caboose-mcp/commit/${SHA}).

          **Trigger commit:** ${MSG}

          Merge to deploy the updated changelog to \`ui.mcp.chrismarasco.io\`."

          # Try create; if it already exists, update it
          if ! gh pr create --base main --head update/changelog --title "$TITLE" --body "$BODY"; then
            PR=$(gh pr list --head update/changelog --json number --jq '.[0].number')
            gh pr edit "$PR" --title "$TITLE" --body "$BODY"
          fi
