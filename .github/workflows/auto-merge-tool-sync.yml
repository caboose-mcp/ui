name: Auto-merge Tool Sync PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: contains(fromJson('["chore: sync", "auto-sync"]'), github.event.pull_request.title)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh pr checks ${{ github.event.pull_request.number }} --required 2>/dev/null | grep -q "pass"; then
            echo "✅ All required checks passed, enabling auto-merge"
            gh pr merge ${{ github.event.pull_request.number }} \
              --auto \
              --rebase \
              --delete-branch
          else
            echo "⏳ Waiting for checks to pass..."
          fi
