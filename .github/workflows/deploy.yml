# deploy.yml — build React app and deploy to S3 + CloudFront
#
# Triggers:
#   - push to main (covers manual merges AND the update/changelog PR merge)
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# Required GitHub variables (non-secret):
#   CLOUDFRONT_DISTRIBUTION_ID — from `tofu output cloudfront_distribution_id`
#   VITE_API_BASE               — https://mcp.chrismarasco.io
#   S3_BUCKET                   — from `tofu output s3_bucket`

name: Deploy UI

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must never be cached — browsers need to pick up new asset hashes
          aws s3 cp dist/index.html s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
