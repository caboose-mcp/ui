# deploy-infra.yml — apply Terraform/OpenTofu for the UI's S3 + CloudFront stack
#
# Triggers:
#   - manual (workflow_dispatch)
#   - push to main that touches terraform/**
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   TF_VAR_ROUTE53_ZONE_ID   — Route53 zone ID (leave empty if DNS is not in AWS)
#
# State lives in the same S3 bucket as caboose-mcp under a separate key:
#   caboose-mcp-tfstate / caboose-mcp-ui/terraform.tfstate

name: Deploy Infra (UI)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "terraform/**"

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "~> 1.6"

      - name: Terraform Init
        run: tofu init

      - name: Terraform Plan
        run: tofu plan -out=tfplan
        env:
          TF_VAR_route53_zone_id: ${{ secrets.TF_VAR_ROUTE53_ZONE_ID }}

      - name: Terraform Apply
        run: tofu apply -auto-approve tfplan

      - name: Export outputs as GitHub variables hint
        run: |
          echo "S3 bucket:               $(tofu output -raw s3_bucket)"
          echo "CloudFront distribution: $(tofu output -raw cloudfront_distribution_id)"
          echo "UI URL:                  $(tofu output -raw ui_url)"
          echo ""
          echo "Set these as GitHub Actions variables in the repo settings:"
          echo "  S3_BUCKET                  = $(tofu output -raw s3_bucket)"
          echo "  CLOUDFRONT_DISTRIBUTION_ID = $(tofu output -raw cloudfront_distribution_id)"
          echo "  VITE_API_BASE              = https://mcp.chrismarasco.io"
