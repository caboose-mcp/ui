# ci.yml — typecheck + build on every PR and push to main
#
# Gates:
#   typecheck — tsc --noEmit
#   build     — vite build (VITE_API_BASE set to production backend)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          VITE_API_BASE: https://mcp.chrismarasco.io
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: dist/
          retention-days: 3
