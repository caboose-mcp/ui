<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="caboose-mcp — 108 MCP tools exposed as a JSON-RPC API. Explore, test, and integrate." />
    <meta name="color-scheme" content="light dark" />
    <meta property="og:title" content="caboose-mcp" />
    <meta property="og:description" content="108 MCP tools for AI assistants. Calendar, notes, focus, Docker, GitHub, and more." />
    <meta property="og:image" content="/logo.png" />
    <meta name="theme-color" content="#0c0c14" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 'system'
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const isDark = theme === 'dark' || (theme === 'system' && prefersDark)
          const html = document.documentElement
          html.classList.remove('light', 'dark')
          html.classList.add(isDark ? 'dark' : 'light')
          const metaTheme = document.querySelector('meta[name="theme-color"]')
          if (metaTheme) {
            metaTheme.setAttribute('content', isDark ? '#0c0c14' : '#f5f5f5')
          }
        } catch {}
      })()
    </script>
    <title>caboose-mcp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-bg text-text-primary antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
